name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend/lifeassistant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven
      - run: mvn --batch-mode compile
      - run: mvn --batch-mode test

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: front/vue3-vant-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: front/vue3-vant-mobile/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build:dev

  admin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: admin_front/vue3-element-admin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: admin_front/vue3-element-admin/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm typecheck
      - run: pnpm build:dev
