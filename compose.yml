x-backend-env: &backend-env
  PROFILES_ACTIVE: prod
  DB_HOST: db
  DB_PORT: "3306"
  DB_NAME: ${MYSQL_DATABASE}
  DB_USER: ${MYSQL_USER}
  DB_PWD: ${MYSQL_PASSWORD}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PWD: ""
  REDIS_DB: "0"
  DOMAIN: ${DOMAIN}
  FRONTEND_HOST: https://app.${DOMAIN}
  BACKEND_CORS_ORIGINS: https://app.${DOMAIN},https://www.${DOMAIN},https://${DOMAIN},https://api.${DOMAIN}
  SECRET_KEY: ${SECRET_KEY?Variable not set}
  FIRST_SUPERUSER: ${FIRST_SUPERUSER?Variable not set}
  FIRST_SUPERUSER_PASSWORD: ${FIRST_SUPERUSER_PASSWORD?Variable not set}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  UPLOAD_DIR: /app/uploads
  TZ: Asia/Shanghai

services:

  db:
    image: mysql:8.4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - app-db-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD?Variable not set}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${MYSQL_DATABASE?Variable not set}
      MYSQL_USER: ${MYSQL_USER?Variable not set}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD?Variable not set}
    networks:
      - default

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      timeout: 5s
    volumes:
      - app-redis-data:/data
    networks:
      - default

  adminer:
    profiles: ["disabled"]
    image: adminer
    restart: unless-stopped
    depends_on:
      - db
    environment:
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - default

  backend:
    image: '${DOCKER_IMAGE_BACKEND:-backend}:${TAG:-latest}'
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    environment:
      <<: *backend-env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    build:
      context: backend
      dockerfile: Dockerfile
    volumes:
      # ponytail: 绑定宿主机目录，重建镜像/容器不会丢上传文件；勿用 docker compose down -v
      - ./data/uploads:/app/uploads
    networks:
      - default

  front:
    image: '${DOCKER_IMAGE_FRONT:-front}:${TAG:-latest}'
    build:
      context: front/vue3-vant-mobile
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - default

  agent:
    image: '${DOCKER_IMAGE_AGENT:-agent}:${TAG:-latest}'
    build:
      context: python/agent
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default

  nginx:
    image: '${DOCKER_IMAGE_NGINX:-nginx}:${TAG:-latest}'
    build:
      context: backend/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs
      - acme-webroot:/var/www/acme:ro
    environment:
      DOMAIN: ${DOMAIN?Variable not set}
      MONITOR_USERNAME: ${MONITOR_USERNAME?Variable not set}
      MONITOR_PASSWORD: ${MONITOR_PASSWORD?Variable not set}
    depends_on:
      backend:
        condition: service_healthy
      front:
        condition: service_started
    networks:
      - default

  acme.sh:
    image: neilpang/acme.sh:3.1.0
    container_name: acme.sh
    volumes:
      - acme-data:/acme.sh
      - acme-webroot:/var/www/acme
      - certs:/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      AUTO_UPGRADE: "1"
    command: daemon
    restart: unless-stopped
    networks:
      - default

  glances:
    image: ccr.ccs.tencentyun.com/life-assistant/glances:latest-full
    restart: unless-stopped
    pid: host
    command: glances -w
    volumes:
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /etc/hostname:/etc/hostname:ro
    networks:
      - default

  dozzle:
    image: ccr.ccs.tencentyun.com/life-assistant/dozzle:v8.11.0
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default

volumes:
  app-db-data:
  app-redis-data:
  acme-data:
  acme-webroot:
  certs:

networks:
  default:
    driver: bridge
