services:

  nginx:
    restart: "no"
    ports:
      - "80:80"
    volumes:
      - ./backend/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

  db:
    restart: "no"
    ports:
      - "33062:3306"

  adminer:
    restart: "no"
    ports:
      - "8080:8080"

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: backend
      dockerfile: Dockerfile
