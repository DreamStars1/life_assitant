# 生产环境 Nginx 配置
# DOMAIN 占位符由 envsubst 在容器启动时替换

# HTTP 80 —— ACME challenge 放行，其余重定向到 HTTPS
server {
    listen 80;
    server_name api.${DOMAIN} app.${DOMAIN} monitor.${DOMAIN} logs.${DOMAIN} mcp.${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# API 后端
server {
    listen 443 ssl;
    http2 on;
    server_name api.${DOMAIN};

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    location / {
        proxy_pass http://backend:8000;
    }
}

# 用户端 PWA
server {
    listen 443 ssl;
    http2 on;
    server_name app.${DOMAIN};

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    location /api/ {
        rewrite ^/api/v1/(.*) /$1 break;
        proxy_pass http://backend:8000;
    }

    location / {
        proxy_pass http://front:80;
    }
}

# 系统监控 - Glances
server {
    listen 443 ssl;
    http2 on;
    server_name monitor.${DOMAIN};

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    auth_basic           "Monitor";
    auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    location / {
        proxy_pass http://glances:61208;
    }
}

# 容器日志 - Dozzle
server {
    listen 443 ssl;
    http2 on;
    server_name logs.${DOMAIN};

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    auth_basic           "Logs";
    auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    location / {
        proxy_pass http://dozzle:8080;
    }
}

# MCP Agent
server {
    listen 443 ssl;
    http2 on;
    server_name mcp.${DOMAIN};

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    proxy_buffering off;
    proxy_request_buffering off;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    location / {
        proxy_pass http://agent:8089;
    }
}
