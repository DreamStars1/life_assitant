--- ### 应用配置
application:
  url: ${FRONTEND_HOST}
  production: true

--- ### 服务器配置
server:
  port: 8000

--- ### 数据源配置
spring.datasource:
  type: com.zaxxer.hikari.HikariDataSource
  url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:app}?serverTimezone=Asia/Shanghai&useSSL=true&useUnicode=true&characterEncoding=utf8&rewriteBatchedStatements=true&autoReconnect=true&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
  username: ${DB_USER:root}
  password: ${DB_PWD:changethis}
  driver-class-name: com.mysql.cj.jdbc.Driver
  hikari:
    maximum-pool-size: 20
    connection-timeout: 30000
    idle-timeout: 600000
    keepaliveTime: 30000
    max-lifetime: 1800000

--- ### Flyway 配置
spring.flyway:
  enabled: true
  locations: classpath:/db/migration
  baseline-on-migrate: true

--- ### 缓存配置
spring.data:
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PWD:changethis}
    database: ${REDIS_DB:0}
    timeout: 10s
    ssl:
      enabled: false
  redisson:
    enabled: true
    mode: SINGLE

jetcache:
  statIntervalMinutes: 0
  local:
    default:
      type: caffeine
      keyConvertor: jackson
      expireAfterWriteInMillis: 7200000
      limit: 1000
  remote:
    default:
      type: redisson
      keyConvertor: jackson
      expireAfterWriteInMillis: 7200000
      broadcastChannel: ${spring.application.name}
      valueEncoder: java
      valueDecoder: java

--- ### 接口文档配置
nextdoc4j:
  production: ${application.production}

--- ### 跨域配置
continew-starter.web.cors:
  enabled: true
  allowed-origins:
    - ${application.url}
  allowed-methods: '*'
  allowed-headers: '*'
  exposed-headers: '*'

--- ### 日志配置
continew-starter.log:
  access-log:
    enabled: false
logging:
  level:
    top.lifeassistant: INFO
    top.continew.starter: INFO
  file:
    path: ../logs

--- ### 加密配置：密码编码器
continew-starter.encrypt.password-encoder:
  enabled: true
  algorithm: BCRYPT

--- ### 加密配置：字段加/解密（已禁用）
continew-starter.encrypt.field:
  enabled: false

--- ### 验证码配置（已禁用）
continew-starter.captcha:
  behavior:
    enabled: false
  graphic:
    enabled: false

--- ### Sa-Token 扩展配置
sa-token.extension:
  security.excludes:
    - /actuator/health
    - /error
    - /*.html
    - /*/*.html
    - /*/*.css
    - /*/*.js
    - /websocket/**
    - /file/**
    - /uploads/**
    - /api/v1/uploads/**
    - /api/v1/auth/**
    - /api/v1/login/**
    - /api/v1/users/signup
    - /api/v1/password-recovery/**
    - /api/v1/reset-password

--- ### Just Auth 配置（已禁用）
continew-starter.justauth:
  enabled: false

--- ### WebSocket 配置（已禁用）
continew-starter.messaging.websocket:
  enabled: false
