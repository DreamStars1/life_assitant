--- ### 应用配置
application:
  id: lifeassistant
  name: Life Assistant
  description: 智能生活助手后端服务
  version: 1.2.0-SNAPSHOT
  base-package: top.lifeassistant

lifeassistant:
  upload-dir: ${UPLOAD_DIR:uploads}

--- ### 服务器配置
server:
  servlet:
    context-path: /
  undertow:
    max-http-post-size: -1
    buffer-size: 512
    direct-buffers: true
    threads:
      io: 8
      worker: 256

--- ### Spring 项目配置
spring:
  application:
    name: ${application.id}
  profiles:
    active: ${PROFILES_ACTIVE:dev}
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  jackson:
    big-number-serialize-mode: FLEXIBLE

--- ## 线程池配置
spring.task:
  execution:
    thread-name-prefix: task-pool
    rejected-policy: CALLER_RUNS
    pool:
      keep-alive: 300s
    shutdown:
      await-termination: true
      await-termination-period: 30s
  scheduling:
    thread-name-prefix: schedule-pool
    rejected-policy: CALLER_RUNS
    shutdown:
      await-termination: true
      await-termination-period: 30s

--- ### 接口文档配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui
  default-flat-param-object: true
  components:
    security-schemes:
      Authorization:
        type: HTTP
        in: HEADER
        name: ${sa-token.token-name}
        scheme: ${sa-token.token-prefix}
nextdoc4j:
  enabled: true
  extension:
    enabled: true
    brand:
      logo: classpath:favicon.ico
      title: ${application.name}

--- ### 日志配置
continew-starter.log:
  includes:
    - DESCRIPTION
    - MODULE
    - REQUEST_HEADERS
    - REQUEST_BODY
    - IP_ADDRESS
    - BROWSER
    - OS
logging:
  config: classpath:logback-spring.xml

--- ### 链路追踪配置
continew-starter.trace:
  enabled: true
  trace-id-name: X-Trace-Id
  tlog:
    enable-invoke-time-print: false
    pattern: '[$spanId][$traceId]'
    mdc-enable: false

--- ### CRUD 配置
continew-starter.crud:
  tree-dict-model:
    id-key: key
    name-key: title
    weight-key: sort

--- ### 租户配置（已禁用）
continew-starter.tenant:
  enabled: false

--- ### 限流器配置（已禁用）
continew-starter.rate-limiter:
  enabled: false

--- ### Sa-Token 配置
sa-token:
  token-name: Authorization
  dynamic-active-timeout: true
  is-share: false
  is-log: false
  jwt-secret-key: changethis-secret-key-must-be-changed
  extension:
    enabled: true
    enableJwt: true
    dao.type: REDIS

--- ### MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*Mapper.xml
  type-aliases-package: ${application.base-package}.**.model
  configuration:
    auto-mapping-behavior: PARTIAL
    database-id: mysql
  global-config:
    banner: true
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: id
  extension:
    enabled: true
    mapper-package: ${application.base-package}.**.mapper
    id-generator:
      type: COSID
    pagination:
      enabled: true
      db-type: MYSQL

--- ### CosId 配置
cosid:
  namespace: ${spring.application.name}
  machine:
    enabled: true
    distributor:
      type: REDIS
    guarder:
      enabled: true
  snowflake:
    enabled: true
    zone-id: Asia/Shanghai
    epoch: 1577203200000
    share:
      clock-sync: true
      converter:
        friendly:
          pad-start: true
    provider:
      safe-js:
        machine-bit: 7
        sequence-bit: 9
